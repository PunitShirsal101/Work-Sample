server:
  port: 8080
spring:
  application:
    name: api-gateway
  main:
    banner-mode: "off"
  cloud:
    gateway:
      routes:
        - id: product-service
          uri: http://localhost:8081
          predicates:
            - Path=/products/**
        - id: order-service
          uri: http://localhost:8082
          predicates:
            - Path=/orders/**
        - id: inventory-service
          uri: http://localhost:8083
          predicates:
            - Path=/inventory/**
      default-filters:
        - RemoveRequestHeader=Cookie
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin RETAIN_UNIQUE
management:
  endpoints:
    web:
      exposure:
        include: health,info
